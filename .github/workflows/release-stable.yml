name: Release Stable DataTang QC Tool

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example 1.0.0
        required: true
        default: 1.0.0

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test launcher
        shell: pwsh
        run: dotnet test launcher/tests/DataTangQCTool.Launcher.Tests/DataTangQCTool.Launcher.Tests.csproj -c Release

      - name: Build runtime
        shell: pwsh
        run: ./scripts/build_runtime.ps1 -OutputDirectory ./artifacts

      - name: Test desktop application with packaged runtime
        shell: pwsh
        run: |
          & './build/runtime/runtime-win-x64/python.exe' -m pip install pytest==8.3.5 pyyaml==6.0.2 pygments==2.19.2
          $env:PYTHONPATH = (Resolve-Path './desktop/production').Path
          $env:QT_QPA_PLATFORM = 'offscreen'
          & './build/runtime/runtime-win-x64/python.exe' -m pytest tests/static desktop/tests -v

      - name: Build desktop app package
        shell: pwsh
        run: ./scripts/build_app_package.ps1 -Version '${{ inputs.version }}' -OutputDirectory ./artifacts

      - name: Build single-file launcher
        shell: pwsh
        run: ./scripts/build_launcher.ps1 -Repository '${{ github.repository }}' -OutputDirectory ./artifacts/launcher

      - name: Generate stable manifest and checksums
        shell: pwsh
        run: |
          $version = '${{ inputs.version }}'
          $tag = "v$version"
          $repo = '${{ github.repository }}'
          $runtime = Resolve-Path './artifacts/runtime-win-x64.zip'
          $app = Resolve-Path './artifacts/app.zip'
          $runtimeHash = (Get-FileHash $runtime -Algorithm SHA256).Hash.ToLowerInvariant()
          $appHash = (Get-FileHash $app -Algorithm SHA256).Hash.ToLowerInvariant()
          $manifest = @{
            schema_version = 1
            channel = 'stable'
            runtime = @{
              version = $version
              url = "https://github.com/$repo/releases/download/$tag/runtime-win-x64.zip"
              sha256 = $runtimeHash
              size = (Get-Item $runtime).Length
            }
            app = @{
              version = $version
              url = "https://github.com/$repo/releases/download/$tag/app.zip"
              sha256 = $appHash
              size = (Get-Item $app).Length
              entrypoint = 'app/main.py'
            }
          }
          $manifest | ConvertTo-Json -Depth 8 | Set-Content './artifacts/stable-manifest.json' -Encoding UTF8
          Get-ChildItem './artifacts' -File -Recurse | ForEach-Object {
            "{0}  {1}" -f ((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()), ($_.FullName.Substring((Resolve-Path './artifacts').Path.Length + 1).Replace('\','/'))
          } | Set-Content './artifacts/SHA256SUMS.txt' -Encoding ASCII

      - name: Create GitHub Release
        shell: pwsh
        run: |
          $tag = "v${{ inputs.version }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --yes --cleanup-tag
          }
          gh release create $tag `
            './artifacts/runtime-win-x64.zip' `
            './artifacts/app.zip' `
            './artifacts/stable-manifest.json' `
            './artifacts/SHA256SUMS.txt' `
            './artifacts/launcher/DataTangQCTool-Launcher.exe' `
            --title "DataTang QC Tool $tag" `
            --notes "Stable desktop QC tool with selectable persistent cache, verified GitHub runtime download, local offline reuse, full QC workflow, and optional Hugging Face model cache." `
            --latest

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DataTangQCTool-stable-${{ inputs.version }}
          path: |
            artifacts/launcher/DataTangQCTool-Launcher.exe
            artifacts/stable-manifest.json
            artifacts/SHA256SUMS.txt
